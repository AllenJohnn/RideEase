<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Search Rides – RideEase</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#0a0a0f;--card:#13131c;--border:#222234;--accent:#f5c542;--accent2:#ff6b35;--text:#f0f0f0;--muted:#7a7a9a;}
    *{box-sizing:border-box;margin:0;padding:0;}
    html{scroll-behavior:smooth;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
    nav{display:flex;align-items:center;justify-content:space-between;padding:1.2rem 2.5rem;border-bottom:1px solid var(--border);background:rgba(10,10,15,.95);backdrop-filter:blur(12px);transition:all .3s ease;animation:slideDown .4s ease both;}
    nav:hover{background:rgba(10,10,15,.98);}
    .logo{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;color:var(--accent);text-decoration:none;transition:transform .3s;}
    .logo:hover{transform:scale(1.05);}
    .logo span{color:var(--accent2);}
    nav a{color:var(--muted);text-decoration:none;font-size:.88rem;margin-left:1.5rem;transition:color .25s,transform .25s;}
    nav a:hover{color:var(--text);transform:translateY(-1px);}
    .page{max-width:620px;margin:3rem auto;padding:0 1.5rem 4rem;}
    h1{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;margin-bottom:.5rem;}
    h1 span{color:var(--accent);}
    .subtitle{color:var(--muted);font-size:.9rem;margin-bottom:2rem;}
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:2rem;transition:all .3s;animation:fadeUp .5s ease both;}
    .card:hover{border-color:rgba(245,197,66,.3);box-shadow:0 8px 24px rgba(245,197,66,.08);}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
    .form-group{margin-bottom:1.2rem;animation:fadeUp .5s ease both;}
    .form-group:nth-child(1){animation-delay:.1s;}
    .form-group:nth-child(2){animation-delay:.15s;}
    .form-group:nth-child(3){animation-delay:.2s;}
    label{display:block;font-size:.78rem;color:var(--muted);margin-bottom:.5rem;text-transform:uppercase;letter-spacing:.5px;transition:color .25s;}
    input,select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:.75rem 1rem;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.95rem;outline:none;transition:all .3s cubic-bezier(.25,.46,.45,.94);}
    input:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(245,197,66,.1);background:rgba(245,197,66,.02);}
    select option{background:var(--bg);}
    .btn{width:100%;padding:.85rem;background:var(--accent);color:#000;border:none;border-radius:8px;font-size:1rem;font-weight:700;font-family:'Syne',sans-serif;cursor:pointer;transition:all .3s cubic-bezier(.25,.46,.45,.94);box-shadow:0 4px 16px rgba(245,197,66,.15);animation:fadeUp .5s .25s ease both;}
    .btn:hover{background:#ffd35a;transform:translateY(-2px);box-shadow:0 8px 32px rgba(245,197,66,.25);}
    .btn:active{transform:translateY(0);}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    @keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
    .note{color:var(--muted);font-size:.82rem;margin-top:1rem;text-align:center;animation:fadeUp .5s .3s ease both;}
    .note a{color:var(--accent);transition:color .25s;text-decoration:none;}
    .note a:hover{color:#ffd35a;text-decoration:underline;}
    @media(max-width:768px){.page{padding:0 1rem;}.card{padding:1.5rem;}.row{grid-template-columns:1fr;}}
  </style>
</head>
<body>
<nav>
  <a href="index.html" class="logo">Ride<span>Ease</span></a>
  <div>
    <a href="index.html">Home</a>
    <a href="book.html">Book a Cab</a>
    <a href="allbookings.php">All Bookings</a>
  </div>
</nav>
<div class="page">
  <h1>Search <span>Rides</span></h1>
  <p class="subtitle">Find all bookings between a source and destination.</p>
  <div class="card">
    <form action="searchride.php" method="GET">
      <div class="row">
        <div class="form-group">
          <label>From (Source)</label>
          <input type="text" name="source" placeholder="e.g. Calicut" required/>
        </div>
        <div class="form-group">
          <label>To (Destination)</label>
          <input type="text" name="dest" placeholder="e.g. Kochi" required/>
        </div>
      </div>
      <div class="form-group">
        <label>Cab Type (optional)</label>
        <select name="cab_type">
          <option value="">All Types</option>
          <option value="Auto">🛺 Auto</option>
          <option value="Mini">🚗 Mini</option>
          <option value="Sedan">🚕 Sedan</option>
          <option value="SUV">🚙 SUV</option>
        </select>
      </div>
      <button class="btn" type="submit">🔍 Search Rides</button>
    </form>
    <p class="note">Or <a href="allbookings.php">view all bookings</a></p>
  </div>
</div>
</body>
</html>
